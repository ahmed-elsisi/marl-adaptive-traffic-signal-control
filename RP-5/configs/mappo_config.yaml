# MAPPO Training Configuration with CENTRALIZED CRITIC
# Research-backed hyperparameters for traffic signal control

# Environment Configuration
env_config:
  network_file: "sumo_network/marl-proj.net.xml"
  route_file: "sumo_network/marl-proj.rou.xml"
  use_gui: false
  num_seconds: 3600  # 1 hour episode
  delta_time: 5  # Action every 5 seconds
  yellow_time: 3
  min_green: 10
  max_green: 50
  sumo_seed: 42
  sumo_warnings: false
  
  # NEW: Optional min-green enforcement
  # false (recommended): Agent learns optimal timing
  # true: Enforces 10s minimum green time
  enforce_min_green: false
  
# Agent Configuration
agents:
  - "J1"
  - "J2"
  - "J3"
  - "J4"

# Network Topology (for neighbor information)
network_topology:
  J1: ["J2", "J3"]
  J2: ["J1", "J4"]
  J3: ["J1", "J4"]
  J4: ["J2", "J3"]

# Detector Configuration (per junction)
detectors:
  J1:
    incoming_edges: ["-E6", "E0", "E16", "-E1"]
    movements: [0, 1, 2]  # right, straight, left
  J2:
    incoming_edges: ["E1", "-E7", "-E11", "-E10"]
    movements: [0, 1, 2]
  J3:
    incoming_edges: ["-E17", "-E16", "-E18", "-E15"]
    movements: [0, 1, 2]
  J4:
    incoming_edges: ["E15", "E11", "-E8", "-E9"]
    movements: [0, 1, 2]

# Normalization Configuration
normalization:
  queue_max: 100
  phase_time_max: 60
  pressure_max: 100
  waiting_time_max: 60
  spatial_discount: 0.9

# Reward Configuration (research-backed coefficients)
reward_config:
  queue_weight: -0.25
  waiting_time_weight: -1.0
  throughput_weight: 0.1
  pressure_weight: -0.4
  neighbor_pressure_weight: -0.5
  spatial_discount: 0.9
  clip_min: -3.0
  clip_max: 1.0

# MAPPO Algorithm Configuration
mappo_config:
  # PPO-specific
  lr: 4.0e-4  # Learning rate (research optimal: 1e-4 to 5e-4)
  gamma: 0.99  # Discount factor
  lambda_: 0.95  # GAE lambda (research optimal: 0.95)
  
  # MAPPO-specific (CRITICAL for stability)
  num_sgd_iter: 15  # 5-15 epochs
  sgd_minibatch_size: 4096  # Minibatch size
  train_batch_size: 32768  # Research optimal: 4000-40000 timesteps
  
  # Clipping and regularization
  clip_param: 0.2  # PPO clip parameter
  vf_clip_param: 10.0  # Value function clipping
  grad_clip: 0.5  # Gradient clipping
  entropy_coeff: 0.02  # Entropy bonus (research optimal: 0.01-0.02)
  vf_loss_coeff: 1.0  # Value function loss coefficient
  
  # Model configuration
  vf_share_layers: false  # CRITICAL: Separate actor and critic
  use_critic: true
  use_gae: true
  
  # Framework
  framework: "torch"
  
  # Multi-agent
  multiagent:
    policies_to_train: ["shared_policy"]
    policy_mapping_fn: "lambda agent_id, episode, worker, **kwargs: 'shared_policy'"
  
  # Rollout settings
  num_rollout_workers: 3  # Adjust based on CPU cores
  num_envs_per_worker: 1
  rollout_fragment_length: 200  # Steps per worker per iteration
  batch_mode: "complete_episodes"
  sample_timeout_s: 120  # SUMO episodes + restart overhead can exceed default 60s
  observation_filter: "MeanStdFilter"  # Running mean/std on observations (Yu et al. universal default)
  # NOTE: this filter was NOT used for the original Semester-1 run. Adding it
  # here for consistency with v2/baseline; existing Semester-1 checkpoints
  # remain the immutable reference for the achieved result.

  # GPU configuration (RTX 3060 Ti optimization)
  num_gpus: 1
  num_gpus_per_worker: 0
  
  # Evaluation
  evaluation_interval: 50
  evaluation_duration: 10
  evaluation_duration_unit: "episodes"
  evaluation_config:
    explore: false
    env_config:
      use_gui: false

# Neural Network Architecture (UPDATED FOR CENTRALIZED CRITIC)
model_config:
  custom_model: "mappo_centralized"  # CHANGED from "mappo_model"
  custom_model_config:
    # CRITICAL: Number of agents for global state construction
    num_agents: 4  # Required for 280-dim global state (70 × 4)
    
    # Actor network (decentralized)
    actor_hiddens: [128, 64]
    actor_activation: "tanh"
    
    # Critic network (centralized, larger capacity)
    # Receives 280-dim global state (70 × 4 agents)
    critic_hiddens: [256, 128, 64]
    critic_activation: "relu"
    
    # Initialization
    use_orthogonal_init: true
    orthogonal_gain: 0.01
    
    # Value normalization (CRITICAL for MAPPO)
    use_value_normalization: true
    
    # Optional: LSTM for temporal dependencies
    use_lstm: false
    lstm_cell_size: 64
    max_seq_len: 20

# Training Configuration
training:
  num_iterations: 1000
  checkpoint_freq: 50
  checkpoint_at_end: true
  keep_checkpoints_num: 5
  
  # Stopping criteria
  stop:
    training_iteration: 1000
    episode_reward_mean: -5  # Target reward
  
  # Logging
  log_level: "INFO"
  log_to_file: true
  
# TensorBoard and Metrics
logging:
  tensorboard_dir: "logs/tensorboard"
  custom_metrics:
    - "avg_queue"
    - "max_queue"
    - "avg_waiting_time"
    - "throughput"
    - "total_pressure"
    - "network_efficiency"

# Reproducibility
seed: 42
torch_seed: 42
numpy_seed: 42