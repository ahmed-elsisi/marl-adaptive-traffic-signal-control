# MAPPO Baseline Configuration — Yu et al. (2021)
# "The Surprising Effectiveness of PPO in Cooperative Multi-Agent Games"
#
# DOMAIN ANALOG: Hanabi (Tables 11 + 18 in the paper appendix).
#   Hanabi is the only adopted MAPPO configuration in the paper that uses an
#   MLP (no GRU/RNN). It is the closest paper-published preset for our setup
#   because (a) our 70-dim traffic observation already contains derivatives
#   and elapsed-phase-time, making it Markov-rich enough to skip recurrence,
#   and (b) RLlib's PPO recurrence path uses LSTM, not GRU, so an MLP-only
#   reproduction avoids an architectural deviation.
#
# CHANGES vs the universal MAPPO defaults (onpolicy/config.py) come from
# Tables 11 (Hanabi common) and 18 (Hanabi adopted):
#   lr (actor):     5e-4 → 7e-4
#   lr (critic):    5e-4 → 1e-3   (asymmetric — see "Caveats" below)
#   entropy_coef:   0.01 → 0.015
#   fc layer dim:   64   → 512    ← bigger MLP compensates for no recurrence
#   num fc:         2    → 2      (so [512, 512])
#   activation:     ReLU → ReLU   (universal; we previously used tanh — wrong)
#   network:        rnn  → mlp    (Hanabi adopted)
#   ppo_epoch:      15   → 15     (universal; matches Hanabi)
#   num_mini_batch: 1    → 1      (universal; matches Hanabi)
#   clip_param:     0.2  → 0.2    (used for BOTH policy and value clipping)
#   max_grad_norm:  10.0 → 10.0   (universal)
#
# CAVEATS / DEVIATIONS (documented for the thesis, not hidden):
#   - Hanabi uses asymmetric learning rates (actor 7e-4, critic 1e-3). RLlib's
#     PPOConfig.training() exposes a single `lr`. We adopt the actor lr (7e-4)
#     as the single value — most defensible since policy updates are what the
#     PPO clipping bound is designed around.
#   - Paper uses a GRU when network=rnn; RLlib's recurrent path is LSTM. We
#     stay MLP to match Hanabi exactly and side-step this mismatch.
#   - vf_clip_param=0.2 — paper applies the SAME clip ε to value loss when
#     `use_clipped_value_loss=True`. RLlib's default 10.0 effectively disables
#     value clipping; we override to 0.2 for paper fidelity.
#
# WHAT IS IDENTICAL to mappo_config.yaml / mappo_config_v2.yaml (ensures fair
# comparison — only ALGORITHM hyperparameters and architecture differ):
#   Environment, SUMO network, reward function, observation space, seed,
#   train_batch_size, parameter sharing, value normalization, orthogonal init,
#   number of workers, training iterations, observation_filter (MeanStdFilter).

# ── Environment Configuration (IDENTICAL to mappo_config.yaml) ───────────────
env_config:
  network_file: "sumo_network/marl-proj.net.xml"
  route_file: "sumo_network/marl-proj.rou.xml"
  use_gui: false
  num_seconds: 3600
  delta_time: 5
  yellow_time: 3
  min_green: 10
  max_green: 50
  sumo_seed: 42
  sumo_warnings: false
  enforce_min_green: false

# ── Agent Configuration (IDENTICAL) ──────────────────────────────────────────
agents:
  - "J1"
  - "J2"
  - "J3"
  - "J4"

# ── Network Topology (IDENTICAL) ─────────────────────────────────────────────
network_topology:
  J1: ["J2", "J3"]
  J2: ["J1", "J4"]
  J3: ["J1", "J4"]
  J4: ["J2", "J3"]

# ── Detector Configuration (IDENTICAL) ───────────────────────────────────────
detectors:
  J1:
    incoming_edges: ["-E6", "E0", "E16", "-E1"]
    movements: [0, 1, 2]
  J2:
    incoming_edges: ["E1", "-E7", "-E11", "-E10"]
    movements: [0, 1, 2]
  J3:
    incoming_edges: ["-E17", "-E16", "-E18", "-E15"]
    movements: [0, 1, 2]
  J4:
    incoming_edges: ["E15", "E11", "-E8", "-E9"]
    movements: [0, 1, 2]

# ── Normalization Configuration (IDENTICAL) ───────────────────────────────────
normalization:
  queue_max: 100
  phase_time_max: 60
  pressure_max: 100
  waiting_time_max: 60
  spatial_discount: 0.9

# ── Reward Configuration (IDENTICAL) ─────────────────────────────────────────
reward_config:
  queue_weight: -0.25
  waiting_time_weight: -1.0
  throughput_weight: 0.1
  pressure_weight: -0.4
  neighbor_pressure_weight: -0.5
  spatial_discount: 0.9
  clip_min: -3.0
  clip_max: 1.0

# ── MAPPO Algorithm Configuration — HANABI ADOPTED VALUES (Table 18) ─────────
mappo_config:
  # PPO-specific
  lr: 7.0e-4         # PAPER (Hanabi actor lr); critic lr 1e-3 not expressible in RLlib
  gamma: 0.99
  lambda_: 0.95

  # PAPER: 15 epochs (Hanabi), num_mini_batch=1 → minibatch == full batch
  num_sgd_iter: 15
  sgd_minibatch_size: 32768   # PAPER: num_mini_batch=1 → equal to train_batch_size
  train_batch_size: 32768

  # Clipping and regularization
  clip_param: 0.2
  vf_clip_param: 0.2     # PAPER: same ε used for value clipping (use_clipped_value_loss=True)
  grad_clip: 10.0        # PAPER: max_grad_norm=10
  entropy_coeff: 0.015   # PAPER (Hanabi): 0.015 (universal default is 0.01)
  vf_loss_coeff: 1.0

  # Model configuration
  vf_share_layers: false
  use_critic: true
  use_gae: true

  # Framework
  framework: "torch"

  # Multi-agent
  multiagent:
    policies_to_train: ["shared_policy"]
    policy_mapping_fn: "lambda agent_id, episode, worker, **kwargs: 'shared_policy'"

  # Rollout settings
  num_rollout_workers: 3
  num_envs_per_worker: 1
  rollout_fragment_length: 200
  batch_mode: "complete_episodes"
  sample_timeout_s: 120
  observation_filter: "MeanStdFilter"   # PAPER (universal): use_feature_normalization=True

  # GPU configuration
  num_gpus: 1
  num_gpus_per_worker: 0

  # Evaluation
  evaluation_interval: 50
  evaluation_duration: 10
  evaluation_duration_unit: "episodes"
  evaluation_config:
    explore: false
    env_config:
      use_gui: false

# ── Neural Network Architecture — HANABI ADOPTED (Tables 11 + 18) ────────────
model_config:
  custom_model: "mappo_centralized"
  custom_model_config:
    num_agents: 4

    # PAPER (Hanabi): 2-layer MLP, fc_dim=512, ReLU
    actor_hiddens: [512, 512]       # PAPER (Hanabi): fc layer dim=512, num fc=2
    actor_activation: "relu"        # PAPER: ReLU (universal; we previously had tanh)

    # PAPER (Hanabi): same 2-layer 512 MLP for the critic
    critic_hiddens: [512, 512]      # PAPER (Hanabi): fc layer dim=512, num fc=2
    critic_activation: "relu"       # PAPER: ReLU

    # Initialization (universal paper default)
    use_orthogonal_init: true
    orthogonal_gain: 0.01

    # Value normalization (universal paper default — use_valuenorm=True)
    use_value_normalization: true

    # MLP only — Hanabi network=mlp; do not enable LSTM
    use_lstm: false
    lstm_cell_size: 64
    max_seq_len: 20

# ── Training Configuration ────────────────────────────────────────────────────
training:
  num_iterations: 1000
  checkpoint_freq: 50
  checkpoint_at_end: true
  keep_checkpoints_num: 5

  stop:
    training_iteration: 1000
    episode_reward_mean: -5

  log_level: "INFO"
  log_to_file: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  tensorboard_dir: "logs/tensorboard"
  custom_metrics:
    - "avg_queue"
    - "max_queue"
    - "avg_waiting_time"
    - "throughput"
    - "total_pressure"
    - "network_efficiency"

# ── Reproducibility (IDENTICAL) ───────────────────────────────────────────────
seed: 42
torch_seed: 42
numpy_seed: 42
