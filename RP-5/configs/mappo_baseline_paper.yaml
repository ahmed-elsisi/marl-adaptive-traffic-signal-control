# MAPPO Baseline Configuration — Yu et al. (2021)
# "The Surprising Effectiveness of PPO in Cooperative Multi-Agent Games"
#
# PRESET: Hanabi adopted MAPPO (Tables 11 + 18 in the paper appendix).
#   Hanabi is the only adopted MAPPO preset that uses an MLP (no GRU/RNN),
#   making it the closest paper-published configuration for our 70-dim
#   traffic observation. Our obs already encodes derivatives and elapsed
#   phase time, so it is Markov-rich enough to skip recurrence.
#
# Hanabi adopted values (Table 18, 2-player) + Hanabi common (Table 11):
#   lr:                    actor=7e-4, critic=1e-3   (RLlib has no asymmetric
#                          lr → we use actor's 7e-4 for both networks)
#   epoch (num_sgd_iter):  15
#   mini-batch:            1   (i.e. sgd_minibatch_size == train_batch_size,
#                          full-batch SGD per epoch)
#   activation:            ReLU (both actor and critic)
#   fc layer dim, num fc:  512, 2  → hidden = [512, 512] (both networks)
#   gain:                  0.01 (orthogonal init on output layer)
#   entropy_coef:          0.015
#   network:               mlp (no GRU/LSTM)
#
# WHAT CHANGES vs mappo_config_v2.yaml (algorithm only — env is identical):
#   lr:                5e-4  → 7e-4
#   num_sgd_iter:      10    → 15
#   entropy_coeff:     0.02  → 0.015
#   grad_clip:         1.0   → 10.0   (paper max_grad_norm = 10)
#   actor_hiddens:     [128, 64]      → [512, 512]
#   critic_hiddens:    [512, 256, 128] → [512, 512]
#   actor_activation:  tanh  → relu
#   critic_activation: relu  → relu (already matched)
#
# WHAT IS IDENTICAL TO mappo_config_v2.yaml (env-side, ensures the comparison
# isolates algorithm changes only):
#   SUMO network, reward function, observation space, seed,
#   ns_edges / ew_edges per junction, edge_connectivity block (so the obs
#   builder produces the same 70-dim features at training and eval time),
#   enforce_min_red=true / min_red=3 (all-red clearance on phase changes),
#   train_batch_size, sgd_minibatch_size (= train_batch_size, paper mini-batch=1),
#   clip_param, vf_clip_param, vf_loss_coeff, value normalization,
#   orthogonal init, number of workers, training iterations.

# ── Environment Configuration (IDENTICAL to mappo_config_v2.yaml) ─────────────
# All env knobs mirror v2 so the comparison isolates algorithm differences only.
env_config:
  network_file: "sumo_network/marl-proj.net.xml"
  route_file: "sumo_network/marl-proj.rou.xml"
  use_gui: false
  num_seconds: 3600
  delta_time: 5
  yellow_time: 3
  min_green: 10
  max_green: 50
  sumo_seed: 42
  sumo_warnings: false
  enforce_min_green: false

  # All-red clearance applied ONLY when an agent actually changes phase.
  # No clearance is added on a hold (no-change) action.
  enforce_min_red: true
  min_red: 3

# ── Agent Configuration (IDENTICAL) ──────────────────────────────────────────
agents:
  - "J1"
  - "J2"
  - "J3"
  - "J4"

# ── Network Topology (IDENTICAL) ─────────────────────────────────────────────
network_topology:
  J1: ["J2", "J3"]
  J2: ["J1", "J4"]
  J3: ["J1", "J4"]
  J4: ["J2", "J3"]

# ── Detector Configuration (IDENTICAL to v2) ─────────────────────────────────
detectors:
  J1:
    incoming_edges: ["-E6", "E0", "E16", "-E1"]
    movements: [0, 1, 2]  # right, straight, left
    ns_edges: ["-E6", "E0"]    # N and S incoming
    ew_edges: ["E16", "-E1"]   # W and E incoming
  J2:
    incoming_edges: ["E1", "-E7", "-E11", "-E10"]
    movements: [0, 1, 2]
    ns_edges: ["E1", "-E7"]
    ew_edges: ["-E11", "-E10"]
  J3:
    incoming_edges: ["-E17", "-E16", "-E18", "-E15"]
    movements: [0, 1, 2]
    ns_edges: ["-E17", "-E16"]
    ew_edges: ["-E18", "-E15"]
  J4:
    incoming_edges: ["E15", "E11", "-E8", "-E9"]
    movements: [0, 1, 2]
    ns_edges: ["E15", "E11"]
    ew_edges: ["-E8", "-E9"]

# ── Edge Connectivity (IDENTICAL to v2) ──────────────────────────────────────
# Required for the obs builder's neighbour outgoing/ingoing pressure features.
edge_connectivity:
  J1:
    J2:
      outgoing: ["-E1"]   # J2→J1
      ingoing:  ["E1"]    # J1→J2
    J3:
      outgoing: ["E16"]   # J3→J1
      ingoing:  ["-E16"]  # J1→J3
  J2:
    J1:
      outgoing: ["E1"]    # J1→J2
      ingoing:  ["-E1"]   # J2→J1
    J4:
      outgoing: ["-E11"]  # J4→J2
      ingoing:  ["E11"]   # J2→J4
  J3:
    J1:
      outgoing: ["-E16"]  # J1→J3
      ingoing:  ["E16"]   # J3→J1
    J4:
      outgoing: ["-E15"]  # J4→J3
      ingoing:  ["E15"]   # J3→J4
  J4:
    J2:
      outgoing: ["E11"]   # J2→J4
      ingoing:  ["-E11"]  # J4→J2
    J3:
      outgoing: ["E15"]   # J3→J4
      ingoing:  ["-E15"]  # J4→J3

# ── Normalization Configuration (IDENTICAL) ───────────────────────────────────
normalization:
  queue_max: 100
  phase_time_max: 60
  pressure_max: 100
  waiting_time_max: 60
  spatial_discount: 0.9

# ── Reward Configuration (IDENTICAL) ─────────────────────────────────────────
reward_config:
  queue_weight: -0.25
  waiting_time_weight: -1.0
  throughput_weight: 0.1
  pressure_weight: -0.4
  neighbor_pressure_weight: -0.4
  spatial_discount: 0.9
  clip_min: -3.0
  clip_max: 1.0

# ── MAPPO Algorithm Configuration — PAPER VALUES (Hanabi adopted) ─────────────
mappo_config:
  # PPO-specific
  lr: 7.0e-4        # PAPER Hanabi: actor=7e-4, critic=1e-3 — RLlib has a single lr,
                    # so we use the actor's 7e-4 for both networks.
  gamma: 0.99
  lambda_: 0.95

  # PAPER: 15 epochs per update, mini-batch=1 (full-batch SGD)
  num_sgd_iter: 15
  sgd_minibatch_size: 32768  # = train_batch_size → paper's "mini-batch = 1"
  train_batch_size: 32768

  # Clipping and regularization
  clip_param: 0.2
  vf_clip_param: 10.0
  grad_clip: 10.0       # PAPER max_grad_norm=10
  entropy_coeff: 0.015  # PAPER Hanabi: 0.015
  vf_loss_coeff: 1.0

  # Model configuration
  vf_share_layers: false
  use_critic: true
  use_gae: true

  # Framework
  framework: "torch"

  # Multi-agent
  multiagent:
    policies_to_train: ["shared_policy"]
    policy_mapping_fn: "lambda agent_id, episode, worker, **kwargs: 'shared_policy'"

  # Rollout settings (IDENTICAL)
  num_rollout_workers: 3
  num_envs_per_worker: 1
  rollout_fragment_length: 200
  batch_mode: "complete_episodes"
  sample_timeout_s: 120  # SUMO episodes + restart overhead can exceed default 60s

  # GPU configuration (IDENTICAL)
  num_gpus: 1
  num_gpus_per_worker: 0

  # Evaluation
  evaluation_interval: 10
  evaluation_duration: 10
  evaluation_duration_unit: "episodes"
  evaluation_config:
    explore: false
    env_config:
      use_gui: false

# ── Neural Network Architecture — PAPER VALUES (Hanabi adopted) ───────────────
model_config:
  custom_model: "mappo_centralized"
  custom_model_config:
    num_agents: 4

    # PAPER Hanabi: fc layer dim=512, num fc=2 → [512, 512], ReLU
    actor_hiddens: [512, 512]
    actor_activation: "relu"

    # PAPER Hanabi: same MLP shape and activation for the critic.
    # Centralized critic input is still 280-dim (4 agents × 70-dim local obs).
    critic_hiddens: [512, 512]
    critic_activation: "relu"

    # Initialization (IDENTICAL)
    use_orthogonal_init: true
    orthogonal_gain: 0.01

    # Value normalization (IDENTICAL — paper uses this)
    use_value_normalization: true

    # LSTM disabled (paper Hanabi adopted = mlp, not rnn)
    use_lstm: false
    lstm_cell_size: 64
    max_seq_len: 20

# ── Training Configuration ────────────────────────────────────────────────────
training:
  num_iterations: 1000
  checkpoint_freq: 50
  checkpoint_at_end: true
  keep_checkpoints_num: 5

  stop:
    training_iteration: 1000
    episode_reward_mean: 10

  log_level: "INFO"
  log_to_file: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  tensorboard_dir: "logs/tensorboard"
  custom_metrics:
    - "avg_queue"
    - "max_queue"
    - "avg_waiting_time"
    - "throughput"
    - "total_pressure"
    - "network_efficiency"

# ── Reproducibility (IDENTICAL) ───────────────────────────────────────────────
seed: 42
torch_seed: 42
numpy_seed: 42
