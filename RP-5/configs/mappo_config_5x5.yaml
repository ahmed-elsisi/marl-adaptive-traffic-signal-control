# ── Normalization Configuration (identical to 2x2) ────────────────────────
normalization:
  queue_max: 100
  phase_time_max: 60
  pressure_max: 100
  waiting_time_max: 60
  spatial_discount: 0.9

# ── Reward Configuration (identical to 2x2) ──────────────────────────────
reward_config:
  queue_weight: -0.25
  waiting_time_weight: -1.0
  throughput_weight: 0.1
  pressure_weight: -0.4
  neighbor_pressure_weight: -0.5
  spatial_discount: 0.9
  clip_min: -3.0
  clip_max: 1.0

