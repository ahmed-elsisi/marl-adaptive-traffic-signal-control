# ── MAPPO Algorithm Configuration ────────────────────────────────────────
mappo_config:
  lr: 5.0e-4
  gamma: 0.99
  lambda_: 0.95

  num_sgd_iter: 15
  sgd_minibatch_size: 4096
  train_batch_size: 65536   # doubled vs 2x2 (25 agents generate more data)

  clip_param: 0.2
  vf_clip_param: 10.0
  grad_clip: 1.0
  entropy_coeff: 0.02
  vf_loss_coeff: 1.0

  vf_share_layers: false
  use_critic: true
  use_gae: true

  framework: "torch"

  multiagent:
    policies_to_train: ["shared_policy"]
    policy_mapping_fn: "lambda agent_id, episode, worker, **kwargs: 'shared_policy'"

  num_rollout_workers: 3
  num_envs_per_worker: 1
  rollout_fragment_length: 200
  batch_mode: "complete_episodes"
  sample_timeout_s: 300   # 25-junction SUMO is heavier than 4-junction

  num_gpus: 1
  num_gpus_per_worker: 0

  evaluation_interval: 50
  evaluation_duration: 5   # reduced from 10; each episode takes longer
  evaluation_duration_unit: "episodes"
  evaluation_config:
    explore: false
    env_config:
      use_gui: false

# ── Neural Network Architecture ───────────────────────────────────────────
model_config:
  custom_model: "mappo_centralized"
  custom_model_config:
    num_agents: 25
    agent_ids:
      - "J1"
      - "J2"
      - "J3"
      - "J4"
      - "J5"
      - "J6"
      - "J7"
      - "J8"
      - "J9"
      - "J10"
      - "J11"
      - "J12"
      - "J13"
      - "J14"
      - "J15"
      - "J16"
      - "J17"
      - "J18"
      - "J19"
      - "J20"
      - "J21"
      - "J22"
      - "J23"
      - "J24"
      - "J25"

    # Actor (decentralized): 70-dim local obs — identical to 2x2
    actor_hiddens: [128, 64]
    actor_activation: "tanh"

    # Critic (centralized): 1750-dim global state (25 × 70) — scaled up
    critic_hiddens: [512, 256, 128]
    critic_activation: "relu"

    use_orthogonal_init: true
    orthogonal_gain: 0.01
    use_value_normalization: true
    use_lstm: false
    lstm_cell_size: 64
    max_seq_len: 20

# ── Training Configuration ────────────────────────────────────────────────
training:
  num_iterations: 1000
  checkpoint_freq: 50
  checkpoint_at_end: true
  keep_checkpoints_num: 5

  stop:
    training_iteration: 1000
    episode_reward_mean: -5

  log_level: "INFO"
  log_to_file: true

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  tensorboard_dir: "logs/tensorboard"
  custom_metrics:
    - "avg_queue"
    - "max_queue"
    - "avg_waiting_time"
    - "throughput"
    - "total_pressure"
    - "network_efficiency"

# ── Reproducibility ───────────────────────────────────────────────────────
seed: 42
torch_seed: 42
numpy_seed: 42
