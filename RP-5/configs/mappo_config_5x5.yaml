# MAPPO Training Configuration — 5x5 Grid (25 agents)
# Scaled from mappo_config_v2.yaml for 25-junction SUMO network.
#
# Key differences vs 2x2 (mappo_config_v2.yaml):
#   network_file / route_file  → sumo_network_5x5/
#   agents                     → 25 junctions (J1–J25)
#   num_agents                 → 25
#   global state dim           → 25 × 70 = 1750
#   critic_hiddens             → [512, 256, 128]  (scaled for 1750-dim input)
#   train_batch_size           → 65536  (doubled; 25 agents × more data)
#   sample_timeout_s           → 300    (25-junction SUMO is heavier)
#   evaluation_duration        → 5      (reduced; longer per-episode wall-clock)

# ── Environment Configuration ─────────────────────────────────────────────
env_config:
  network_file: "sumo_network_5x5/5x5-grid.net.xml"
  route_file:   "sumo_network_5x5/5x5-grid.rou.xml"
  use_gui: false
  num_seconds: 3600
  delta_time: 5
  yellow_time: 3
  min_green: 10
  max_green: 50
  sumo_seed: 42
  sumo_warnings: false
  enforce_min_green: false
  # netconvert generates programID='0'; our 8-phase ttl.xml uses programID='1'
  tl_program_id: "1"

# ── Agent Configuration ───────────────────────────────────────────────────
agents:
  - "J1"
  - "J2"
  - "J3"
  - "J4"
  - "J5"
  - "J6"
  - "J7"
  - "J8"
  - "J9"
  - "J10"
  - "J11"
  - "J12"
  - "J13"
  - "J14"
  - "J15"
  - "J16"
  - "J17"
  - "J18"
  - "J19"
  - "J20"
  - "J21"
  - "J22"
  - "J23"
  - "J24"
  - "J25"

# ── Network Topology (2 neighbors per junction) ───────────────────────────
# Primary = East (col+1); rightmost col uses West (col-1)
# Secondary = South (row+1); bottom row uses North (row-1)
network_topology:
  J1:  ["J2",  "J6"]
  J2:  ["J3",  "J7"]
  J3:  ["J4",  "J8"]
  J4:  ["J5",  "J9"]
  J5:  ["J4",  "J10"]
  J6:  ["J7",  "J11"]
  J7:  ["J8",  "J12"]
  J8:  ["J9",  "J13"]
  J9:  ["J10", "J14"]
  J10: ["J9",  "J15"]
  J11: ["J12", "J16"]
  J12: ["J13", "J17"]
  J13: ["J14", "J18"]
  J14: ["J15", "J19"]
  J15: ["J14", "J20"]
  J16: ["J17", "J21"]
  J17: ["J18", "J22"]
  J18: ["J19", "J23"]
  J19: ["J20", "J24"]
  J20: ["J19", "J25"]
  J21: ["J22", "J16"]
  J22: ["J23", "J17"]
  J23: ["J24", "J18"]
  J24: ["J25", "J19"]
  J25: ["J24", "J20"]

# ── Detector Configuration (25 junctions × 4 edges × 3 movements = 300) ──
detectors:
  J1:
    incoming_edges: ["BN_0", "-V_0_0", "BW_0", "-H_0_0"]
    movements: [0, 1, 2]
    ns_edges: ["BN_0", "-V_0_0"]
    ew_edges: ["BW_0", "-H_0_0"]
  J2:
    incoming_edges: ["BN_1", "-V_0_1", "H_0_0", "-H_0_1"]
